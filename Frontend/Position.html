<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        background-color: hsl(0, 9%, 86%);
      }

      body {
        margin: 20px;
        height: calc(100vh - 40px);
        background-color: white;
        border: 2px solid black;
        border-radius: 12px;
        border-width: 0px 2px 2px 3px;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        width: 400px;
        height: 530px;
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
      }

      .card > div {
        background-color: white;
      }

      .card-img {
        position: relative;
      }

      .card-img::after {
        content: "hot";
        position: absolute;
        top: 0;
        right: 0;
        background-color: red;
        color: white;
        padding: 16px 18px;
        border-radius: 14px;
        font-size: 16px;
      }

      .card-title {
        font-size: 28px;
        font-weight: bold;
      }

      .card-content {
        font-size: px;
        color: #676262;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-img">
        <img src="https://picsum.photos/500/300/?random=10" />
      </div>
      <div class="card-title">卡片標題</div>
      <div class="card-content">
        這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容
      </div>
    </div>
  </body>
</html>
